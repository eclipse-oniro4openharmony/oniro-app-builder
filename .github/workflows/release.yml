# Release workflow: on push to main, opens a "Version Packages" PR when changesets
# are present, and publishes to npm + tags + creates a GitHub Release when that PR
# is merged.
#
# Authenticates to npm via Trusted Publishing (OIDC) — no NPM_TOKEN required. The
# `@oniroproject/core` and `@oniroproject/oniro-app` packages have a trusted
# publisher configured on npmjs.com pointing at this workflow file in this repo,
# so `id-token: write` here is what npm uses to mint a short-lived publish token
# at runtime. Trusted publishing also attaches provenance attestations
# automatically, so no NPM_CONFIG_PROVENANCE flag is needed.
#
# Requires npm CLI 11.5.1+ for OIDC support, which is newer than the version
# bundled with Node 20 — the explicit `npm install -g npm@latest` upgrades it.

name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm install -g npm@latest

      - run: npm ci

      - run: npm run build

      - name: Create Release PR or publish
        uses: changesets/action@v1
        with:
          publish: npm run release
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
