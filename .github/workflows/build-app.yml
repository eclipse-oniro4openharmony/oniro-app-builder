# Reusable workflow: sign and build a downloaded OpenHarmony project, verifying the
# toolchain/sign/lint command surface along the way, then upload the signed .hap.
#
# Consumes an artifact uploaded by another job containing the project tree at the
# artifact root. Produces:
#   - <hap_artifact>: the signed .hap (single file)
#
# The emulator job installs its own command-line tools, so no toolchains artifact is
# shipped from here anymore.

name: Build app

on:
  workflow_call:
    inputs:
      project_artifact:
        type: string
        required: true
        description: Name of an existing artifact containing the project tree.
      sdk_version:
        type: string
        default: '6.1'
      hap_artifact:
        type: string
        default: built-hap
    outputs:
      hap_file:
        description: Filename of the signed .hap produced by the build.
        value: ${{ jobs.build.outputs.hap_file }}
      hap_artifact:
        description: Artifact name carrying the signed .hap.
        value: ${{ inputs.hap_artifact }}

jobs:
  build:
    runs-on: oniro-runner
    outputs:
      hap_file: ${{ steps.locate.outputs.hap_file }}
    steps:
      - name: Checkout repository (for the CLI sources)
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Java (for hap-sign-tool)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends openjdk-17-jre-headless

      - name: Build the oniro-app CLI from source
        run: |
          npm ci
          npm run build
          npm install -g ./packages/cli

      - name: Cache OpenHarmony SDK
        uses: actions/cache@v4
        with:
          path: ~/setup-ohos-sdk
          key: ohos-sdk-${{ runner.os }}-${{ inputs.sdk_version }}

      - name: Install OpenHarmony SDK
        run: oniro-app sdk install ${{ inputs.sdk_version }}

      - name: Cache command-line tools
        uses: actions/cache@v4
        with:
          path: ~/command-line-tools
          key: ohos-cmdtools-${{ runner.os }}

      - name: Install command-line tools
        run: oniro-app cmdtools install

      - name: Verify toolchain is installed (sdk list / cmdtools status)
        run: |
          oniro-app sdk list --json
          oniro-app cmdtools status --json

      - name: Download project under test
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.project_artifact }}
          path: project

      - name: Sign the project (sign, then verify --bootstrap is a no-op)
        working-directory: ${{ github.workspace }}/project
        run: |
          oniro-app sign
          oniro-app sign --bootstrap

      - name: Lint the project (lint)
        # Codelinter findings set a non-zero exit; surface them without failing the build.
        continue-on-error: true
        working-directory: ${{ github.workspace }}/project
        run: oniro-app lint

      - name: Build the app (build)
        working-directory: ${{ github.workspace }}/project
        run: oniro-app build

      - name: Locate signed HAP
        id: locate
        working-directory: ${{ github.workspace }}/project
        run: |
          HAP_PATH=$(find entry/build -name '*-signed.hap' | head -1)
          if [ -z "$HAP_PATH" ]; then
            echo "::error::No signed .hap found under entry/build" && exit 1
          fi
          echo "Found: $HAP_PATH"
          echo "hap_file=$(basename "$HAP_PATH")" >> "$GITHUB_OUTPUT"
          mkdir -p "$GITHUB_WORKSPACE/build-output"
          cp "$HAP_PATH" "$GITHUB_WORKSPACE/build-output/"

      - name: Upload signed HAP
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.hap_artifact }}
          path: build-output
