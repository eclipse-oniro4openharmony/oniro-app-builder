# Cross-platform CI for the @oniroproject/core library and @oniroproject/oniro-app CLI.
# Runs the inner dev loop (typecheck, build, unit tests) on Linux, macOS, and Windows so
# regressions in path resolution, child-process invocation, or zip/tar handling are caught
# before they reach a release.

name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - run: npm run typecheck

      - run: npm run build

      - run: npm test

  docker:
    # Validates the Dockerfile through the `builder` stage so the npm + global-install
    # pipeline is exercised on every PR, without paying for the multi-GB SDK download
    # that the `runtime` stage does. Full image builds happen on release.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build Dockerfile (builder stage only)
        uses: docker/build-push-action@v6
        with:
          context: .
          target: builder
          push: false
          tags: oniro-app:builder
