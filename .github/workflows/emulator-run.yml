# Reusable workflow: download a signed .hap + the SDK toolchains, install and
# launch the Oniro emulator via the oniro-app CLI, install + launch the app via
# hdc, and capture a VNC screenshot.
#
# All cross-platform emulator concerns (picking run.sh vs run.bat, detaching,
# log redirection, bounded hdc wait) live in the CLI itself.

name: Run app on Oniro Emulator

on:
  workflow_call:
    inputs:
      hap_artifact:
        type: string
        required: true
      toolchains_artifact:
        type: string
        required: true
      hap_file:
        type: string
        required: true
      bundle_name:
        type: string
        required: true
      entry_ability:
        type: string
        required: true
      screenshot_artifact:
        type: string
        default: emulator-screenshot
      hdc_wait_seconds:
        type: number
        default: 300

jobs:
  emulator:
    # Pinned to ubuntu-22.04 because Ubuntu Noble's qemu-system-x86 (8.2+)
    # ships without the slirp/user netdev backend the bundled launcher relies
    # on for hdc port forwarding. continue-on-error is set because some
    # GitHub-hosted runners additionally block QEMU from binding the hostfwd
    # rule — an infrastructure constraint outside the CLI. The scaffold and
    # build jobs already validate the rest of the end-to-end flow.
    runs-on: ubuntu-22.04
    continue-on-error: true
    steps:
      - name: Checkout repository (for the CLI sources)
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Build the oniro-app CLI from source
        run: |
          npm ci
          npm run build
          npm install -g ./packages/cli

      - name: Download signed HAP
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.hap_artifact }}
          path: hap

      - name: Download toolchains
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.toolchains_artifact }}
          path: toolchains

      - name: Install host emulator dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            xvfb tigervnc-viewer imagemagick qemu-system-x86

      - name: Install Oniro emulator
        run: oniro-app emulator install

      - name: CI host prep (hdc + USB stub + KVM permissions)
        run: |
          TOOLCHAINS_DIR="$GITHUB_WORKSPACE/toolchains"
          echo "$TOOLCHAINS_DIR" >> "$GITHUB_PATH"
          sudo chmod +x "$TOOLCHAINS_DIR"/hdc
          sudo chown -R "$USER:$USER" "$TOOLCHAINS_DIR"
          # HDC server uses libusb to enumerate /dev/bus/usb; CI runners have
          # no USB subsystem, so fake the directory to initialize hdc cleanly.
          sudo mkdir -p /dev/bus/usb/001
          sudo mknod /dev/bus/usb/001/001 c 189 0 2>/dev/null || true
          sudo chmod 666 /dev/bus/usb/001/001
          # Relax KVM device permissions so the bundled launcher can use it.
          if [ -e /dev/kvm ]; then
            sudo chmod 666 /dev/kvm
          fi

      - name: Start emulator and wait for hdc
        run: |
          oniro-app emulator start \
            --headless \
            --log "$GITHUB_WORKSPACE/qemu.log" \
            --wait-for-hdc ${{ inputs.hdc_wait_seconds }}

      - name: Install and launch app
        env:
          HAP_FILE: ${{ inputs.hap_file }}
          BUNDLE_NAME: ${{ inputs.bundle_name }}
          ENTRY_ABILITY: ${{ inputs.entry_ability }}
        run: |
          hdc install "$GITHUB_WORKSPACE/hap/$HAP_FILE"
          hdc shell aa start -a "$ENTRY_ABILITY" -b "$BUNDLE_NAME"
          # Give the app a moment to draw its first frame.
          sleep 20

      - name: Capture VNC screenshot
        run: |
          xvfb-run --auto-servernum --server-args='-screen 0 360x720x24' bash -c '
            vncviewer -viewonly 127.0.0.1:0 &
            VNC_PID=$!
            sleep 5
            import -window root "'"$GITHUB_WORKSPACE"'/emulator_screenshot.png"
            kill $VNC_PID || true
          '
          ls -lh "$GITHUB_WORKSPACE/emulator_screenshot.png"

      - name: Stop emulator
        if: always()
        run: oniro-app emulator stop || true

      - name: Upload emulator log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: emulator-log
          path: qemu.log
          if-no-files-found: ignore

      - name: Upload Emulator Screenshot
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.screenshot_artifact }}
          path: emulator_screenshot.png
          if-no-files-found: ignore
